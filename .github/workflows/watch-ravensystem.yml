name: Watch RavenSystem HAA (servicios y configuracion)

# Vigila donde RavenSystem define los SERVICIOS (tipos de accesorio) y la
# CONFIGURACION de HAA (types.h, header.h, setup). Cuando cambian, abre un
# issue de aviso (y GitHub manda email) para revisar si hay que llevar mejoras
# al configurador MEPLHAA. NO aplica cambios: solo detecta y avisa.

on:
  schedule:
    - cron: '0 6 * * *'      # cada dia a las 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM: RavenSystem/esp-homekit-devices
    steps:
      - name: Detectar cambios en servicios/config de HAA
        run: |
          set -e
          BASE="HAA/HAA_Main/main"
          FILES="$BASE/types.h $BASE/header.h $BASE/setup.html $BASE/setup.c"
          newest_sha=""; newest_date=""
          : > issue-body.md
          echo "RavenSystem puede haber cambiado **servicios o configuracion** de HAA. Revisar si hay mejoras para el configurador MEPLHAA (tipos de accesorio, claves de configuracion, log/io, opciones de servicios)." >> issue-body.md
          echo "" >> issue-body.md
          echo "Ultimo cambio por fichero vigilado:" >> issue-body.md
          for f in $FILES; do
            sha=$(gh api "repos/$UPSTREAM/commits?path=$f&per_page=1" --jq '.[0].sha' 2>/dev/null || echo "")
            [ -z "$sha" ] && continue
            date=$(gh api "repos/$UPSTREAM/commits?path=$f&per_page=1" --jq '.[0].commit.committer.date' 2>/dev/null || echo "")
            msg=$(gh api "repos/$UPSTREAM/commits?path=$f&per_page=1" --jq '.[0].commit.message' 2>/dev/null | head -1)
            short=$(echo "$sha" | cut -c1-8)
            echo "- \`$f\` -> [$short](https://github.com/$UPSTREAM/commit/$sha) ($date) - $msg" >> issue-body.md
            if [ "$date" \> "$newest_date" ]; then newest_date="$date"; newest_sha="$sha"; fi
          done
          if [ -z "$newest_sha" ]; then echo "No se pudo leer el historial. Nada que hacer."; exit 0; fi
          newest_short=$(echo "$newest_sha" | cut -c1-8)
          echo "" >> issue-body.md
          echo "Fuente: https://github.com/$UPSTREAM/tree/master/$BASE  ·  Wiki: https://github.com/$UPSTREAM/wiki" >> issue-body.md
          echo "_Aviso automatico. Referencia: $newest_short._" >> issue-body.md

          COUNT=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --search "in:title $newest_short" --json number --jq 'length')
          if [ "$COUNT" != "0" ]; then echo "Ya avisado de $newest_short. Nada que hacer."; exit 0; fi
          gh issue create --repo "$GITHUB_REPOSITORY" --title "HAA servicios/config actualizados: $newest_short" --body-file issue-body.md
          echo "Issue de aviso creado para $newest_short."
