name: Watch RavenSystem HAA (servicios y configuracion)

# Vigila los ficheros del firmware HAA donde RavenSystem define los SERVICIOS
# (tipos de accesorio) y las OPCIONES DE CONFIGURACION. Cuando cambian, abre un
# issue de aviso con el enlace al diff, para revisar si hay que llevar mejoras
# (nuevos servicios/claves) al configurador MEPLHAA.
# NO aplica cambios: solo detecta y avisa; la actualizacion se revisa a mano.

on:
  schedule:
    - cron: '0 6 * * *'      # cada dia a las 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check-haa-services:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM: RavenSystem/esp-homekit-devices
    steps:
      - name: Detectar cambios en servicios/config de HAA
        run: |
          set -e
          BASE="HAA/HAA_Main/main"
          # Ficheros que definen servicios (tipos de accesorio) y opciones de configuracion
          FILES="$BASE/types.h $BASE/header.h $BASE/setup.html $BASE/setup.c"

          newest_sha=""
          newest_date=""
          report="issue-body.md"
          : > "$report"
          echo "RavenSystem puede haber cambiado **servicios o configuracion** de HAA. Revisar si hay mejoras que llevar al configurador MEPLHAA (tipos de accesorio, claves de configuracion, valores de log/io, opciones de servicios)." >> "$report"
          echo "" >> "$report"
          echo "Ultimo cambio por fichero vigilado:" >> "$report"

          for f in $FILES; do
            sha=$(gh api "repos/$UPSTREAM/commits?path=$f&per_page=1" --jq '.[0].sha' 2>/dev/null || echo "")
            [ -z "$sha" ] && continue
            date=$(gh api "repos/$UPSTREAM/commits?path=$f&per_page=1" --jq '.[0].commit.committer.date' 2>/dev/null || echo "")
            msg=$(gh api "repos/$UPSTREAM/commits?path=$f&per_page=1" --jq '.[0].commit.message' 2>/dev/null | head -1)
            short=$(echo "$sha" | cut -c1-8)
            echo "- \`$f\` -> [$short]($( echo https://github.com/$UPSTREAM/commit/$sha )) ($date) - $msg" >> "$report"
            if [ "$date" \> "$newest_date" ]; then newest_date="$date"; newest_sha="$sha"; fi
          done

          if [ -z "$newest_sha" ]; then
            echo "No se pudo leer el historial de los ficheros. Nada que hacer."; exit 0
          fi
          newest_short=$(echo "$newest_sha" | cut -c1-8)

          echo "" >> "$report"
          echo "Enlaces utiles:" >> "$report"
          echo "- Carpeta fuente: https://github.com/$UPSTREAM/tree/master/$BASE" >> "$report"
          echo "- Wiki (Service-Types / General): https://github.com/$UPSTREAM/wiki" >> "$report"
          echo "" >> "$report"
          echo "_Aviso automatico (watch-ravensystem). Referencia de cambio: $newest_short._" >> "$report"

          TITLE="HAA servicios/config actualizados: $newest_short"
          COUNT=$(gh issue list --repo "$GITHUB_REPOSITORY" --state all --search "in:title $newest_short" --json number --jq 'length')
          if [ "$COUNT" != "0" ]; then
            echo "Ya avisado del cambio $newest_short. Nada que hacer."; exit 0
          fi

          gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body-file "$report"
          echo "Issue creado para el cambio $newest_short."
